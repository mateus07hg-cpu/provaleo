<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almoxarifado — Controle de Materiais</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1><span class="icon">📦</span> Almoxarifado</h1>
    <span class="badge">Sistema de Controle</span>
  </header>

  <div class="dashboard">
    <div class="card">
      <label>Total de Itens</label>
      <div class="value" id="total-itens">—</div>
    </div>
    <div class="card">
      <label>Quantidade Total</label>
      <div class="value" id="total-quantidade">—</div>
    </div>
  </div>

  <main>

    <aside class="panel">

      <div class="panel-box">
        <h2>Cadastrar Material</h2>

        <div class="field">
          <label for="input-nome">Nome do Material</label>
          <input type="text" id="input-nome" placeholder="Ex.: Papel A4" autocomplete="off" />
        </div>

        <div class="field">
          <label for="input-quantidade">Quantidade</label>
          <input type="number" id="input-quantidade" placeholder="Ex.: 100" min="1" />
        </div>

        <button id="btn-cadastrar">Cadastrar</button>
        <div id="toast"></div>
      </div>

      <div class="panel-box">
        <h2>Baixa de Estoque</h2>

        <div class="field">
          <label for="input-retirada">Quantidade a Retirar</label>
          <input type="number" id="input-retirada" placeholder="Ex.: 10" min="1" />
        </div>

        <p class="hint">
          Selecione uma linha na tabela e clique em <strong>Baixar</strong>.
        </p>
      </div>

    </aside>

    <section class="list-panel">
      <div class="list-header">
        <h2>Estoque de Materiais</h2>
        <input type="text" id="input-busca" placeholder="🔍 Pesquisar material…" />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Material</th>
              <th>Quantidade</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="lista-materiais">
            <tr class="empty-row">
              <td colspan="3"><span class="spinner"></span> Carregando…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="main.js"></script>
</body>
</html>
